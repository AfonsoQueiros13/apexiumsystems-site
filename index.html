<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Apexium Systems</title>

  <!-- FAVICONS -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- IOS HOME SCREEN ICON -->
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- IOS APP MODE -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Apexium Systems">

  <!-- ANDROID / THEME -->
  <meta name="theme-color" content="#04152f">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      font-family:'Inter',sans-serif;
      color:white;
      overflow-x:hidden;

      background:
      radial-gradient(circle at top,#0d47a1 0%,#04152f 35%,#010814 100%);
    }

    .container{
      width:100%;
      max-width:1300px;
      margin:auto;
      padding:40px 24px;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:90px;
    }

    .logo-text{
      font-size:24px;
      font-weight:800;
      letter-spacing:2px;
      color:#53c9ff;
    }

    .hero{
      text-align:center;
      padding-top:30px;
    }

    .hero-logo{
      width:230px;
      margin-bottom:35px;

      filter:
      drop-shadow(0 0 30px rgba(0,170,255,0.4));
    }

    .hero h1{
      font-size:72px;
      line-height:1.05;
      font-weight:800;
      margin-bottom:28px;
      max-width:1000px;
      margin-inline:auto;
    }

    .hero h1 span{
      color:#53c9ff;
    }

    .hero p{
      max-width:850px;
      margin:auto;
      color:rgba(255,255,255,0.75);
      font-size:22px;
      line-height:1.8;
      margin-bottom:45px;
    }

    .hero-buttons{
      display:flex;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
    }

    .btn{
      text-decoration:none;
      padding:18px 30px;
      border-radius:18px;
      font-weight:600;
      transition:0.25s ease;
    }

    .btn-primary{
      background:
      linear-gradient(135deg,#0ea5ff,#2563eb);

      color:white;

      box-shadow:
      0 15px 40px rgba(37,99,235,0.35);
    }

    .btn-primary:hover{
      transform:translateY(-3px);
    }

    .btn-secondary{
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(14px);
      color:white;
    }

    .platform-showcase{
      margin-top:140px;
    }

    .showcase-text{
      text-align:center;
      max-width:900px;
      margin:auto;
      margin-bottom:70px;
    }

    .tag{
      display:inline-block;
      padding:10px 18px;
      border-radius:999px;

      background:
      rgba(255,255,255,0.06);

      border:
      1px solid rgba(255,255,255,0.1);

      color:#53c9ff;

      font-size:14px;
      font-weight:700;
      letter-spacing:1px;
      text-transform:uppercase;

      margin-bottom:22px;
    }

    .showcase-text h2{
      font-size:54px;
      line-height:1.15;
      margin-bottom:22px;
    }

    .showcase-text p{
      color:rgba(255,255,255,0.72);
      font-size:20px;
      line-height:1.8;
    }

    .devices-grid{
      display:grid;
      grid-template-columns:
      repeat(auto-fit,minmax(320px,1fr));

      gap:28px;
    }

    .device-card{
      position:relative;
      overflow:hidden;
      border-radius:28px;
      height:450px;

      background:
      rgba(255,255,255,0.05);

      border:
      1px solid rgba(255,255,255,0.08);

      transition:0.3s ease;
    }

    .device-card:hover{
      transform:translateY(-8px);

      border-color:
      rgba(83,201,255,0.4);

      box-shadow:
      0 20px 60px rgba(0,0,0,0.4);
    }

    .device-card img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .device-overlay{
      position:absolute;
      bottom:0;
      left:0;
      right:0;

      padding:34px;

      background:
      linear-gradient(
      to top,
      rgba(0,0,0,0.92),
      rgba(0,0,0,0.2),
      transparent);
    }

    .device-overlay h3{
      font-size:30px;
      margin-bottom:10px;
    }

    .device-overlay p{
      color:rgba(255,255,255,0.75);
      font-size:16px;
      line-height:1.6;
    }

    .services{
      margin-top:150px;
    }

    .section-title{
      text-align:center;
      font-size:52px;
      margin-bottom:22px;
    }

    .section-subtitle{
      text-align:center;
      max-width:800px;
      margin:auto;
      color:rgba(255,255,255,0.72);
      line-height:1.8;
      font-size:20px;
      margin-bottom:70px;
    }

    .cards{
      display:grid;
      grid-template-columns:
      repeat(auto-fit,minmax(300px,1fr));

      gap:28px;
    }

    .card{
      padding:34px;
      border-radius:28px;

      background:
      rgba(255,255,255,0.05);

      border:
      1px solid rgba(255,255,255,0.08);

      backdrop-filter:blur(18px);

      transition:0.3s ease;
    }

    .card:hover{
      transform:translateY(-6px);

      border-color:
      rgba(83,201,255,0.4);
    }

    .card h3{
      font-size:28px;
      margin-bottom:18px;
    }

    .card p{
      color:rgba(255,255,255,0.72);
      line-height:1.8;
    }

    .contact{
      margin-top:150px;
      text-align:center;
      padding-bottom:80px;
    }

    .contact h2{
      font-size:52px;
      margin-bottom:20px;
    }

    .contact p{
      color:rgba(255,255,255,0.72);
      font-size:20px;
      margin-bottom:28px;
    }

    .email{
      display:inline-block;

      padding:20px 30px;

      border-radius:18px;

      background:
      rgba(255,255,255,0.05);

      border:
      1px solid rgba(255,255,255,0.1);

      color:#53c9ff;

      text-decoration:none;
      font-weight:700;
      font-size:18px;

      transition:0.25s ease;
    }

    .email:hover{
      transform:translateY(-2px);
    }

    footer{
      text-align:center;
      padding:35px;
      color:rgba(255,255,255,0.4);
      font-size:14px;
    }

    @media(max-width:768px){

      .hero h1{
        font-size:46px;
      }

      .hero p{
        font-size:18px;
      }

      .showcase-text h2,
      .section-title,
      .contact h2{
        font-size:36px;
      }

      .showcase-text p,
      .section-subtitle,
      .contact p{
        font-size:18px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <nav>
      <div class="logo-text">
        APEXIUM SYSTEMS
      </div>
    </nav>

    <section class="hero">

      <img
        class="hero-logo"
        src="logo.png"
        alt="Apexium Systems Logo"
      >

      <h1>
        We build <span>modern software</span><br>
        for ambitious businesses
      </h1>

      <p>
        Apexium Systems develops premium custom software focused on
        scalability, performance, automation and world-class user experiences.
        We transform ideas into real digital products.
      </p>

      <div class="hero-buttons">

        <a
          href="mailto:apexiumsystems@gmail.com"
          class="btn btn-primary"
        >
          Contact Us
        </a>

        <a
          href="#services"
          class="btn btn-secondary"
        >
          Explore Services
        </a>

      </div>

    </section>

  </div>

</body>
</html>
